name: Push Docker image

on:
  release:
    types: [published]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag for the resulting images"
        type: string
        required: True
        default: 'stable'

env:
  TAG: ${{ inputs.tag || 'stable' }}
  DOCKER_HUB_OWNER: ${{ vars.DOCKER_HUB_OWNER || github.repository_owner }}
  PLATFORMS: ${{ vars.PLATFORMS || 'linux/amd64,linux/arm64/v8' }}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  setup:
    name: Compute build matrix
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set_matrix.outputs.matrix }}
      arches: ${{ steps.set_matrix.outputs.arches }}
    steps:
      - name: Compute matrix from selected platforms
        id: set_matrix
        run: |
          include='[]'
          arches=()
          if [[ "$PLATFORMS" == *"linux/amd64"* ]]; then
            include=$(jq -c '. + [{"arch":"amd64","platform":"linux/amd64","runner":"ubuntu-22.04"}]' <<< "$include")
            arches+=(amd64)
          fi
          if [[ "$PLATFORMS" == *"linux/arm64"* ]]; then
            include=$(jq -c '. + [{"arch":"arm64","platform":"linux/arm64/v8","runner":"ubuntu-22.04-arm"}]' <<< "$include")
            arches+=(arm64)
          fi
          echo "matrix={\"include\":$include}" >> "$GITHUB_OUTPUT"
          echo "arches=${arches[*]}" >> "$GITHUB_OUTPUT"

  build_and_push_grist:
    name: Build and push ${{ matrix.arch }} grist and grist-ee
    runs-on: ${{ matrix.runner }}
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - name: Free some space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/share/swift

      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Add a dummy ext/ directory
        run:
          mkdir ext && touch ext/dummy

      - name: Check out the ext/ directory
        run: buildtools/checkout-ext-directory.sh grist-ee

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push grist by digest
        id: build_grist
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: GRIST_ALLOW_AUTOMATIC_VERSION_CHECKING=true
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.DOCKER_HUB_OWNER }}/grist,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=grist-${{ matrix.arch }}
          cache-to: type=gha,scope=grist-${{ matrix.arch }},mode=max
          build-contexts: ext=ext

      # ext/Dockerfile builds its base as `${BASE_IMAGE}:${BASE_VERSION}`, but grist was pushed
      # by digest (no tag exists yet). Read the digest so we can reference grist from ext/Dockerfile
      # in the next step as grist@sha256:DIGEST.
      - name: Read grist digest
        id: read_grist_digest
        env:
          DIGEST: ${{ steps.build_grist.outputs.digest }}
        run: echo "hex=${DIGEST#sha256:}" >> "$GITHUB_OUTPUT"

      - name: Build and push grist-ee by digest
        id: build_grist_ee
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ext/Dockerfile
          build-args: |
            BASE_IMAGE=${{ env.DOCKER_HUB_OWNER }}/grist@sha256
            BASE_VERSION=${{ steps.read_grist_digest.outputs.hex }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.DOCKER_HUB_OWNER }}/grist-ee,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=grist-ee-${{ matrix.arch }}
          cache-to: type=gha,scope=grist-ee-${{ matrix.arch }},mode=max

      - name: Export digests
        run: |
          mkdir -p /tmp/digests/grist /tmp/digests/grist-ee
          grist_digest="${{ steps.build_grist.outputs.digest }}"
          grist_ee_digest="${{ steps.build_grist_ee.outputs.digest }}"
          touch "/tmp/digests/grist/${grist_digest#sha256:}"
          touch "/tmp/digests/grist-ee/${grist_ee_digest#sha256:}"

      - name: Upload digests
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1
          if-no-files-found: error

  publish_grist:
    name: Publish grist/grist-ee manifests and full edition extensions
    runs-on: ubuntu-22.04
    needs: [setup, build_and_push_grist]
    steps:
      - name: Free some space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/share/swift

      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate metadata tag input
        id: meta_input
        run: |
          {
            echo "tags<<EOF"
            echo "type=ref,event=branch"
            echo "type=ref,event=pr"
            echo "type=semver,pattern={{version}}"
            echo "type=semver,pattern={{major}}.{{minor}}"
            echo "type=semver,pattern={{major}}"
            echo "${{ env.TAG }}"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKER_HUB_OWNER }}/grist
          tags: |
            ${{ steps.meta_input.outputs.tags }}

      - name: Docker meta (EE)
        id: meta_ee
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKER_HUB_OWNER }}/grist-ee
          tags: |
            ${{ steps.meta_input.outputs.tags }}

      - name: Create grist manifest list and push
        working-directory: /tmp/digests/grist
        env:
          METADATA_JSON: ${{ steps.meta.outputs.json }}
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$METADATA_JSON") \
            $(printf '${{ env.DOCKER_HUB_OWNER }}/grist@sha256:%s ' *)

      - name: Create grist-ee manifest list and push
        working-directory: /tmp/digests/grist-ee
        env:
          METADATA_JSON: ${{ steps.meta_ee.outputs.json }}
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$METADATA_JSON") \
            $(printf '${{ env.DOCKER_HUB_OWNER }}/grist-ee@sha256:%s ' *)

      - name: Build and publish full edition extensions
        id: pkg
        env:
          IMAGE: ${{ env.DOCKER_HUB_OWNER }}/grist:${{ env.TAG }}
          CHANNEL: release
          LABEL: ${{ env.TAG }}
          GRIST_STATIC_HOST: ${{ vars.GRIST_STATIC_HOST || 'https://grist-static.com' }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.GRIST_STATIC_AWS_REGION || 'us-east-1' }}
          GRIST_STATIC_S3_BUCKET: ${{ vars.GRIST_STATIC_S3_BUCKET || 'grist-static' }}
          GRIST_STATIC_S3_PREFIX: ${{ vars.GRIST_STATIC_S3_PREFIX || 'grist-full-edition' }}
        run: buildtools/publish-grist-full-edition.sh

  build_and_push_grist_oss:
    name: Build and push ${{ matrix.arch }} grist-oss
    runs-on: ${{ matrix.runner }}
    needs: [setup, publish_grist]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - name: Free some space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/share/swift

      - name: Check out the repo
        uses: actions/checkout@v4

      # grist-oss does not bundle ext/ but the `ext=ext` build-context requires it.
      - name: Add a dummy ext/ directory
        run:
          mkdir ext && touch ext/dummy

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push grist-oss by digest
        id: build_grist_oss
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            GRIST_ALLOW_AUTOMATIC_VERSION_CHECKING=false
            GRIST_BUILD_CHANNEL=release
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.DOCKER_HUB_OWNER }}/grist-oss,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=grist-oss-${{ matrix.arch }}
          cache-to: type=gha,scope=grist-oss-${{ matrix.arch }},mode=max
          build-contexts: ext=ext

      - name: Export digest
        run: |
          mkdir -p /tmp/digests/grist-oss
          digest="${{ steps.build_grist_oss.outputs.digest }}"
          touch "/tmp/digests/grist-oss/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-oss-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1
          if-no-files-found: error

  publish_grist_oss:
    name: Publish grist-oss manifest
    runs-on: ubuntu-22.04
    needs: build_and_push_grist_oss
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-oss-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKER_HUB_OWNER }}/grist-oss
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            ${{ env.TAG }}

      - name: Create grist-oss manifest list and push
        working-directory: /tmp/digests/grist-oss
        env:
          METADATA_JSON: ${{ steps.meta.outputs.json }}
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$METADATA_JSON") \
            $(printf '${{ env.DOCKER_HUB_OWNER }}/grist-oss@sha256:%s ' *)
